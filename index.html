<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github/login</title>

  <!-- Tailwind and DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet" href="./style.css">
</head>
<body >
  <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mx-auto mt-10">    
    <img class="mx-auto" src="./assets/github-logo.png" alt="">
    <h2 class="text-center font-bold text-2xl pt-3">GitHub Issues Tracker</h2>
    <p class="text-center pb-4">Sign in to manage your issues</p>
  
    <label class="label font-semibold">Username</label>
    <input id="username" type="email" class="input" placeholder="Write your username : admin" />
  
    <label class="label font-semibold">Password</label>
    <input id="password" type="password" class="input" placeholder="Write your  Password : admin123" />
  
    <button id="login" class="btn btn-primary mt-4">Log in</button>
  </fieldset>







</body>




<script src="./index.js"></script>
</html>
