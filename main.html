<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github/main</title>
   
  <!-- Tailwind and DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="./style.css">
</head>

<body class="">
 
 <header class="flex  justify-between items-center p-4 w-[80%] mx-auto bg-white ">
  <div class="left flex items-center gap-1 cursor-pointer">
    <img class="w-[20%]" src="./assets/github-logo.png" alt="">
    <h2 class="font-bold">GitHub Issues Tracker</h2>
  </div>
  <div class="right flex gap-2">
    <input class="border-gray-300 p-2 rounded-xl" type="text" placeholder="Search Issue ...">
    <button class="btn btn-primary font-bold">+ New Issue</button>
  </div>
 </header>

 <section class="mainContent    bg-green-100">
   <div class="main w-[80%] mx-auto">
    <p class="bg-green-100">.</p>
    <!-- top Btn  -->
    <div class="topBtn flex gap-4  p-4 rounded-2xl bg-white mt-2 sticky top-1">
      <button onclick="btnClicked('allBtn')" id="allBtn"  class="allBtn btn btn-active btn-primary btns">All</button>
      <button onclick="btnClicked('openBtn')" id="openBtn" class="openBtn btn btn-active btn-primary btns">Open</button>
      <button onclick="btnClicked('closedBtn')" id="closedBtn" class="closedBtn btn btn-active btn-primary btns">Closed</button>
    </div>
    <!-- top status -->
    <div class="topStatus flex  justify-between items-center bg-white my-4 p-4 rounded-2xl sticky top-20">
      <div class="left flex gap-2">
        <img class="w-[50px] p-1 bg-gray-300  rounded-full" src="./assets/Aperture.png" alt="">
        <div class="text">
          <h2 class="font-semibold"><span>50</span> Issues</h2>
          <p class="text-gray-500">Track and manage your project issue</p>
        </div>
      </div>

      <div class="right flex items-center gap-6 text-sm font-medium text-gray-700">
        <!-- Open -->
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-green-500 rounded-full"></span>
          <span>Open</span>
        </div>
      
        <!-- Closed -->
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
          <span>Closed</span>
        </div>
      
      </div>
    </div>
    <!-- spinner  -->
    <div id="spinner" class="spinner text-center hidden">
      <span class="loading loading-infinity loading-xl "></span>
    </div>
    <!-- cards -->
    <div id="content" class="content grid grid-cols-4 gap-4  p-4 rounded-2xl bg-rose-100">
    </div>
    <p>.</p>
   
   </div>
 </section>




</body>




<script src="./main.js"></script>

</html>
